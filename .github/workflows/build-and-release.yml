name: Build APK on Commit

on:
  push:
    branches:
      - master
      - main
      - develop
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/**'
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch: # Keep manual trigger for testing

concurrency:
  group: build-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    outputs:
      version_name: ${{ steps.version.outputs.version_name }}
      version_code: ${{ steps.version.outputs.version_code }}
      apk_debug_path: ${{ steps.debug_artifact.outputs.apk_debug_path }}
      apk_release_path: ${{ steps.release_artifact.outputs.apk_release_path }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Capture version metadata
        id: version
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          import os, pathlib, re
          gradle = pathlib.Path("presentation/build.gradle").read_text()
          code_match = re.search(r"^\s*versionCode\s+(\d+)", gradle, re.MULTILINE)
          name_match = re.search(r"^\s*versionName\s+['\"]([\d\.]+)['\"]", gradle, re.MULTILINE)
          if not code_match or not name_match:
              raise SystemExit("Unable to read versionCode/versionName from presentation/build.gradle")
          out = pathlib.Path(os.environ["GITHUB_OUTPUT"])
          out.write_text(
              f"version_code={code_match.group(1)}\n"
              f"version_name={name_match.group(1)}\n"
              f"tag_name=v{name_match.group(1)}\n"
          )
          PY

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Build debug APK (with your modifications)
        run: ./gradlew clean assembleDebug

      - name: Build release APK (signed - optional)
        if: false # Disable by default for speed, enable if you need signed release
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          mkdir -p presentation
          echo "$KEYSTORE_B64" | base64 -d > presentation/my-release-key.keystore
          chmod 600 presentation/my-release-key.keystore
          ./gradlew assembleRelease

      - name: Locate debug APK
        id: debug_artifact
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(presentation/build/outputs/apk/debug/QUIK-v*-debug.apk)
          if [[ "${#files[@]}" -ne 1 ]]; then
            echo "::error title=APK lookup failed::Expected 1 APK, found ${#files[@]} (${files[*]:-none})."
            exit 1
          fi
          echo "apk_debug_path=${files[0]}" >> "$GITHUB_OUTPUT"

      - name: Locate release APK
        id: release_artifact
        if: false
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(presentation/build/outputs/apk/release/QUIK-v*-release.apk)
          if [[ "${#files[@]}" -ne 1 ]]; then
            echo "::error title=APK lookup failed::Expected 1 APK, found ${#files[@]} (${files[*]:-none})."
            exit 1
          fi
          echo "apk_release_path=${files[0]}" >> "$GITHUB_OUTPUT"

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: QUIK-debug-${{ github.sha }}
          path: ${{ steps.debug_artifact.outputs.apk_debug_path }}
          retention-days: 30

      - name: Upload release APK (if built)
        if: false
        uses: actions/upload-artifact@v7
        with:
          name: QUIK-release-${{ github.sha }}
          path: ${{ steps.release_artifact.outputs.apk_release_path }}
          retention-days: 30
